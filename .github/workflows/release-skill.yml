name: Release Skill

on:
  workflow_dispatch:
    inputs:
      skill:
        description: Skill/package to release, for example watch-video
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-skill
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bump selected skill version
        id: bump
        run: |
          version="$(python3 scripts/bump-skill-version.py "${{ inputs.skill }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${version}"

      - name: Build package artifacts and indexes
        run: make build-packages

      - name: Run tests
        run: make test

      - name: Syntax check scripts
        run: make syntax

      - name: Verify public packages
        run: make verify-packages

      - name: Verify skill metadata
        run: make verify-skill-metadata

      - name: Stage expected release outputs
        run: git add "packages/${{ inputs.skill }}/.claude-plugin/plugin.json" .claude-plugin/marketplace.json skillshare-hub.json

      - name: Verify source indexes are current
        run: make verify-source-clean

      - name: Check whitespace
        run: git diff --cached --check

      - name: Commit release
        id: commit
        run: |
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "packages/${{ inputs.skill }}/.claude-plugin/plugin.json" .claude-plugin/marketplace.json skillshare-hub.json
          git commit -m "Release ${{ inputs.skill }} ${{ steps.bump.outputs.version }}"
          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          SKILL: ${{ inputs.skill }}
          VERSION: ${{ steps.bump.outputs.version }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          tag="${SKILL}@${VERSION}"
          title="${SKILL} ${VERSION}"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Public skill release for \`${SKILL}\`.

          Version: \`${VERSION}\`
          Source: \`packages/${SKILL}\`

          Source package:

          - \`packages/${SKILL}\`

          Claude Desktop custom-skill artifacts can be built locally with:

          - \`make build-packages\`

          Install/update details are in \`docs/updating-a-skill.md\`.
          EOF

          gh release create "${tag}" \
            --title "${title}" \
            --notes-file "${notes_file}" \
            --target "${COMMIT_SHA}" \
            --latest=false
