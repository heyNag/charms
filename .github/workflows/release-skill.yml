name: Release Skill

on:
  workflow_dispatch:
    inputs:
      skill:
        description: Skill/package to release
        required: true
        type: choice
        options:
          - watch-video
          - codex-reset-credit
          - x-bookmarks

permissions:
  contents: write

concurrency:
  group: release-skill
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Bump selected skill version
        id: bump
        run: |
          version="$(python3 scripts/bump-skill-version.py "${{ inputs.skill }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${version}"

      - name: Rebuild generated skill targets
        run: make rebuild-generated

      - name: Run tests
        run: make test

      - name: Syntax check scripts
        run: make syntax

      - name: Build MCP placeholder
        run: make mcp-build

      - name: Verify public packages
        run: make verify-packages

      - name: Verify skill metadata
        run: make verify-skill-metadata

      - name: Audit generated source mapping
        run: make audit-generated

      - name: Stage expected release outputs
        run: git add "packages/${{ inputs.skill }}/plugin/plugin.json" generated .claude-plugin skillshare-hub.json

      - name: Verify generated outputs are clean
        run: make verify-generated-clean

      - name: Check whitespace
        run: git diff --cached --check

      - name: Commit release
        run: |
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "packages/${{ inputs.skill }}/plugin/plugin.json" generated .claude-plugin skillshare-hub.json
          git commit -m "Release ${{ inputs.skill }} ${{ steps.bump.outputs.version }}"
          git push origin HEAD:${GITHUB_REF_NAME}
