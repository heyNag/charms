name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Python tests
        run: make test

      - name: Syntax check scripts
        run: make syntax

      - name: Build MCP placeholder
        run: make mcp-build

      - name: Build public packages
        run: make rebuild-generated

      - name: Verify public packages
        run: make verify-packages

      - name: Verify generated outputs are committed
        run: make verify-generated-clean
