name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enforce release-only version bumps
        run: |
          base="${PR_BASE_SHA:-$PUSH_BASE_SHA}"
          head="${PR_HEAD_SHA:-$GITHUB_SHA}"
          python3 scripts/check-version-policy.py --base "$base" --head "$head" --actor "$GITHUB_ACTOR"
        env:
          PUSH_BASE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Python tests
        run: make test

      - name: Syntax check scripts
        run: make syntax

      - name: Build MCP placeholder
        run: make mcp-build

      - name: Build package artifacts and indexes
        run: make build-packages

      - name: Verify public packages
        run: make verify-packages

      - name: Verify skill metadata
        run: make verify-skill-metadata

      - name: Verify source indexes are current
        run: make verify-source-clean
